<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonkeyCraft</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="welcome-screen">
      <div class="welcome-scene">
        <div class="welcome-sun"></div>
        <div class="welcome-cloud welcome-cloud--a"></div>
        <div class="welcome-cloud welcome-cloud--b"></div>
        <div class="welcome-cloud welcome-cloud--c"></div>
        <div class="floating-block floating-block--grass"></div>
        <div class="floating-block floating-block--stone"></div>
        <div class="floating-block floating-block--sand"></div>
        <div class="floating-block floating-block--wood"></div>
        <div class="welcome-ground"></div>
        <div class="welcome-scanlines"></div>
      </div>
      <div class="welcome-panel">
        <div class="welcome-kicker">MonkeyCraft Demo</div>
        <div class="welcome-hero">
          <div class="welcome-brand">
            <img src="./assets/brand/monkeycode-logo-colored.png" alt="MonkeyCode AI" class="welcome-brand-logo" />
          </div>
          <h1 class="welcome-title">MonkeyCraft</h1>
        </div>
        <p class="welcome-copy">
          一个使用
          <a href="https://monkeycode-ai.com/" target="_blank" rel="noreferrer">MonkeyCode AI</a>
          编程平台制作的网页版 Minecraft 演示 Demo。
        </p>
        <p class="welcome-copy welcome-copy--small">
          MonkeyCode AI:
          <a href="https://monkeycode-ai.com/" target="_blank" rel="noreferrer">https://monkeycode-ai.com/</a>
        </p>
        <div class="welcome-actions">
          <button id="start-game-button" class="welcome-button">开始游戏</button>
          <div id="welcome-status" class="welcome-status">等待开始</div>
        </div>
        <div id="welcome-loading" class="welcome-loading hidden" aria-hidden="true">
          <div class="welcome-loading-bar">
            <div class="welcome-loading-fill"></div>
          </div>
          <div class="welcome-loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
    <div id="hud" class="hidden">
      <div id="underwater-overlay" class="hidden"></div>
      <div id="crosshair"></div>
      <div id="status"></div>
      <div id="hotbar-hud">
        <div id="hotbar-label"></div>
        <div id="vitals">
          <div id="health-bar" class="vital-row"></div>
          <div id="hunger-bar" class="vital-row"></div>
        </div>
        <div id="hotbar-xp">
          <div id="hotbar-xp-fill"></div>
        </div>
        <div id="hotbar"></div>
      </div>
      <div id="toolbox" class="hidden">
        <div class="inventory-screen">
          <div class="inventory-slot inventory-slot--armor inventory-slot--helmet inventory-armor-slot inventory-armor-slot--helmet"></div>
          <div class="inventory-slot inventory-slot--armor inventory-slot--chestplate inventory-armor-slot inventory-armor-slot--chestplate"></div>
          <div class="inventory-slot inventory-slot--armor inventory-slot--leggings inventory-armor-slot inventory-armor-slot--leggings"></div>
          <div class="inventory-slot inventory-slot--armor inventory-slot--boots inventory-armor-slot inventory-armor-slot--boots"></div>
          <div class="inventory-slot inventory-slot--offhand inventory-slot--shield"></div>
          <div class="inventory-player">
            <div class="inventory-player-preview">
              <canvas id="inventory-player-canvas" width="140" height="220"></canvas>
            </div>
          </div>
          <div class="inventory-crafting">
            <div class="inventory-crafting-title">合成</div>
          </div>
          <button id="recipe-book-toggle" class="recipe-book-toggle" type="button" aria-label="打开配方书"></button>
          <div class="inventory-storage">
            <div id="inventory-list" class="inventory-slot-grid"></div>
            <div id="inventory-hotbar-grid" class="inventory-slot-grid inventory-slot-grid--hotbar"></div>
          </div>
          <div id="recipe-panel" class="recipe-panel hidden">
            <div class="recipe-panel-title">配方书</div>
            <div id="recipe-list" class="recipe-panel-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
