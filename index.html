<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Minecraft Web</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="welcome-screen">
      <div class="welcome-panel">
        <div class="welcome-kicker">MonkeyCraft</div>
        <h1 class="welcome-title">进入像素世界</h1>
        <p class="welcome-copy">
          先准备地形、树木和资源，再进入单机生存沙盒。
        </p>
        <div class="welcome-actions">
          <button id="start-game-button" class="welcome-button">开始游戏</button>
          <div id="welcome-status" class="welcome-status">等待开始</div>
        </div>
        <div class="welcome-notes">
          <span>探索更大的地图</span>
          <span>采集、合成、建造</span>
          <span>纯前端单机存档</span>
        </div>
      </div>
    </div>
    <div id="hud">
      <div id="tips">点击屏幕开始 | WASD 移动 | Space 跳跃 | Shift 冲刺 | 左键挖掘 | 右键放置</div>
      <div id="crosshair"></div>
      <div id="status"></div>
      <div id="toolbox" class="hidden">
        <div class="toolbox-title">物品栏 / 制作 (E)</div>
        <div class="toolbox-grid">
          <div>
            <div class="toolbox-subtitle">背包</div>
            <div id="inventory-list" class="toolbox-list"></div>
          </div>
          <div>
            <div class="toolbox-subtitle">合成</div>
            <div id="recipe-list" class="toolbox-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
